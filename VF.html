<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gears of War - Grafo Legible</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #0f0f11;
            color: #eeeeee;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        header {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 15px 0;
            text-align: center;
            background: #5a0000;
            border-bottom: 1px solid #c41e3a;
            pointer-events: none;
            z-index: 10;
        }
        h2 { margin: 0; font-size: 1.8rem; color: #fff; text-transform: uppercase; letter-spacing: 2px;}
        svg { width: 100vw; height: 100vh; }
        
        .link { fill: none; stroke: #444; stroke-width: 1.5px; opacity: 0.6; }
        .node circle { stroke: #111; stroke-width: 1.5px; }
    </style>
</head>
<body>

    <header>
        <h2>Ontología Gears of War</h2>
    </header>

    <div id="graph"></div>

    <script>
        var width = window.innerWidth;
        var height = window.innerHeight;
        // Le damos un poco más de margen restando 150 en lugar de 120
        var radius = Math.min(width, height) / 2 - 150; 

        var svg = d3.select("#graph").append("svg")
            .attr("width", width)
            .attr("height", height)
            .append("g")
            .attr("transform", "translate(" + (width / 2) + "," + (height / 2 + 30) + ")");

        d3.json("VF.json").then(function(data) {
            
            var tree = d3.tree()
                .size([2 * Math.PI, radius])
                .separation(function(a, b) { return (a.parent == b.parent ? 1 : 2) / a.depth; });

            var root = d3.hierarchy(data);
            tree(root);

            // Dibujar las conexiones
            svg.append("g")
                .selectAll("path")
                .data(root.links())
                .join("path")
                .attr("class", "link")
                .attr("d", d3.linkRadial()
                    .angle(function(d) { return d.x; })
                    .radius(function(d) { return d.y; }));

            var node = svg.append("g")
                .selectAll("g")
                .data(root.descendants())
                .join("g")
                .attr("class", "node")
                .attr("transform", function(d) {
                    var angulo = (d.x * 180 / Math.PI - 90);
                    return "rotate(" + angulo + ") translate(" + d.y + ",0)";
                });

            // Colores por nivel de profundidad
            node.append("circle")
                .attr("r", function(d) { return d.depth === 0 ? 8 : (d.depth === 1 ? 6 : 3); })
                .attr("fill", function(d) { return d.depth === 0 ? "#ffffff" : (d.depth === 1 ? "#ff3333" : "#8a0303"); });

            // Lógica avanzada para los textos
            node.append("text")
                .attr("dy", "0.31em")
                .attr("x", function(d) { 
                    if (d.depth === 1) return 0; // Centrar las categorías
                    return d.x < Math.PI === !d.children ? 8 : -8; 
                })
                .attr("text-anchor", function(d) { 
                    if (d.depth === 1) return "middle"; // Alineación central para las categorías
                    return d.x < Math.PI === !d.children ? "start" : "end"; 
                })
                .attr("transform", function(d) { 
                    if (d.depth === 1) {
                        // Anulamos la rotación del nodo para que el texto quede horizontal
                        // y lo empujamos en el eje Y hacia adentro del pétalo
                        var anguloInverso = -(d.x * 180 / Math.PI - 90);
                        return "rotate(" + anguloInverso + ") translate(0, -25)";
                    }
                    return d.x >= Math.PI ? "rotate(180)" : null; 
                })
                .text(function(d) { return d.data.name; })
                .style("font-size", function(d) { return d.depth === 1 ? "14px" : "11px"; })
                .style("font-weight", function(d) { return d.depth === 1 ? "bold" : "normal"; })
                .style("fill", function(d) { return d.depth === 1 ? "#ffffff" : "#cccccc"; })
                .style("text-shadow", "1px 1px 3px #000, -1px -1px 3px #000"); // Sombra para resaltar sobre las líneas

        }).catch(function(error) {
            console.error("Error:", error);
        });
    </script>
</body>
</html>
