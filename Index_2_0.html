<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gears of War - Radial Tree Knowledge Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #0f0f11;
            color: #eeeeee;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        header {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 15px 0;
            text-align: center;
            background: #5a0000;
            border-bottom: 1px solid #c41e3a;
            pointer-events: none;
        }
        h2 { margin: 0; font-size: 1.8rem; color: #fff; text-transform: uppercase; letter-spacing: 2px;}
        svg { width: 100vw; height: 100vh; }
        
        .link { fill: none; stroke: #444; stroke-width: 1.5px; opacity: 0.8; }
        .node circle { fill: #c41e3a; stroke: #111; stroke-width: 2px; }
        .node text { font-size: 13px; fill: #dcdcdc; pointer-events: none; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>

    <header>
        <h2>Ontología Gears of War</h2>
    </header>

    <div id="graph"></div>

    <script>
        // Formato ES5 puro y seguro para evitar errores de token
        var width = window.innerWidth;
        var height = window.innerHeight;
        var radius = Math.min(width, height) / 2 - 120; 

        var svg = d3.select("#graph").append("svg")
            .attr("width", width)
            .attr("height", height)
            .append("g")
            .attr("transform", "translate(" + (width / 2) + "," + (height / 2 + 20) + ")");

        // Leer el archivo de datos JSON
        d3.json("tree_data.json").then(function(data) {
            
            var tree = d3.tree()
                .size([2 * Math.PI, radius])
                .separation(function(a, b) { return (a.parent == b.parent ? 1 : 2) / a.depth; });

            var root = d3.hierarchy(data);
            tree(root);

            svg.append("g")
                .selectAll("path")
                .data(root.links())
                .join("path")
                .attr("class", "link")
                .attr("d", d3.linkRadial()
                    .angle(function(d) { return d.x; })
                    .radius(function(d) { return d.y; }));

            var node = svg.append("g")
                .selectAll("g")
                .data(root.descendants())
                .join("g")
                .attr("class", "node")
                .attr("transform", function(d) {
                    var angulo = (d.x * 180 / Math.PI - 90);
                    return "rotate(" + angulo + ") translate(" + d.y + ",0)";
                });

            node.append("circle")
                .attr("r", function(d) { return d.depth === 0 ? 10 : (d.children ? 7 : 4); })
                .attr("fill", function(d) { return d.depth === 0 ? "#ffffff" : (d.depth === 1 ? "#8a0303" : "#c41e3a"); });

            node.append("text")
                .attr("dy", "0.31em")
                .attr("x", function(d) { return d.x < Math.PI === !d.children ? 10 : -10; })
                .attr("text-anchor", function(d) { return d.x < Math.PI === !d.children ? "start" : "end"; })
                .attr("transform", function(d) { return d.x >= Math.PI ? "rotate(180)" : null; })
                .text(function(d) { return d.data.name; });

        }).catch(function(error) {
            console.error("Error cargando tree_data.json:", error);
            document.getElementById("graph").innerHTML = "<h3 style='color:white; text-align:center; margin-top:100px;'>No se pudo cargar el archivo JSON. Verifica que 'tree_data.json' esté en GitHub.</h3>";
        });
    </script>
</body>
</html>
